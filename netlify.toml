# Netlify Configuration for DGHM 文件管理系統 (DMS)

[build]
  # 建置命令
  # 使用 --legacy-peer-deps 來解決 React 19 與搜尋插件的依賴衝突
  command = "npm install --legacy-peer-deps && npm run build"
  
  # 發布目錄（Docusaurus 建置後的輸出目錄）
  publish = "build"
  
  # 建置環境變數
  [build.environment]
    # Node.js 版本（Docusaurus 需要 >= 20.0）
    NODE_VERSION = "20"
    # NPM 版本
    NPM_VERSION = "10"

# 重定向規則（具體規則需放在 /* 之前，否則會被 SPA 規則吃掉）

# 登入後導向：開此網址會直接到「最新一則會議記錄」
# 請在 Netlify Identity 將「登入後導向 URL」設為 /latest-meeting
[[redirects]]
  from = "/latest-meeting"
  to = "/docs/tailormed/會議記錄/2603/mm-260315"
  status = 302
  force = true

# 修正錯誤路徑：登入或舊連結可能指向沒有年月資料夾的會議記錄，導向正確路徑或最新會議
[[redirects]]
  from = "/docs/TailorMed/會議記錄/MM-260109"
  to = "/docs/tailormed/會議記錄/2602/mm-260109"
  status = 302
  force = true
[[redirects]]
  from = "/docs/tailormed/會議記錄/mm-260109"
  to = "/docs/tailormed/會議記錄/2602/mm-260109"
  status = 302
  force = true
[[redirects]]
  from = "/docs/tailormed/會議記錄/MM-260109"
  to = "/docs/tailormed/會議記錄/2602/mm-260109"
  status = 302
  force = true

# SPA 回退：其餘路徑交給前端路由
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 安全標頭
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # 允許搜尋索引檔案載入
    Access-Control-Allow-Origin = "*"

# 快取設定 - 靜態資源長期快取
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/search/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

